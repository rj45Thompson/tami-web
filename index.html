<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tami - live board</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e1a; overflow: hidden; font-family: Consolas, monospace; }
    #app { width: 100%; height: 100%; }
    #hud {
      position: fixed; top: 8px; left: 8px; color: #cfe3ff; background: rgba(10, 14, 30, .72);
      padding: 8px 12px; border: 1px solid #2a3b66; border-radius: 6px; font-size: 12px;
      line-height: 1.5; pointer-events: none; white-space: pre;
    }
    #hud .err { color: #ff7b7b; }
    #hud .ok { color: #7bff9f; }
    #feed {
      position: fixed; bottom: 8px; left: 8px; color: #9fb4dd; background: rgba(10, 14, 30, .72);
      padding: 6px 10px; border: 1px solid #2a3b66; border-radius: 6px; font-size: 11px;
      line-height: 1.45; pointer-events: none; max-width: 46em;
      font-family: Consolas, monospace;
    }
    #feed:empty { display: none; }
    #unityview {
      position: fixed; top: 8px; right: 8px; border: 1px solid #2a3b66; border-radius: 6px;
      overflow: hidden; background: #000; display: none; cursor: pointer;
    }
    #unityview img { display: block; width: 380px; height: auto; }
    #unityview.big img { width: 900px; }
    #unityview .tag {
      position: absolute; left: 6px; top: 4px; color: #cfe3ff; font: 11px Consolas, monospace;
      background: rgba(10, 14, 30, .7); padding: 1px 6px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">connecting to sim...</div>
  <div id="feed"></div>
  <div id="unityview" title="click to toggle size"><img id="unityframe" alt="" /><span class="tag">UNITY LIVE</span></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
