name: pages

# NOTE 2026-07-20: push trigger disabled - the GitHub account has a billing
# lock, so Actions jobs refuse to start. Pages currently deploys via the
# LEGACY branch route instead (npm run build, push dist to gh-pages - see
# README "Deploying the hosted viewer"). When billing is fixed: re-add the
# push trigger and switch Pages build_type back to workflow.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
